<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CPO Advanced Schematic Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CPO Advanced Schematic Simulator</h1>
    </header>
    <div id="app">
        <aside id="controls">
            <label>Mode: <select id="mode"><option value="TX">TX (Transmit)</option><option value="RX">RX (Receive)</option></select></label>
            <label>Laser Power (P_in): <input type="range" id="pin" min="6" max="26" step="0.1" value="20"></label>
            <label>Substrate: <select id="substrate"><option value="Standard">Standard MCM</option><option value="RDL">RDL InFO</option><option value="CoWoS">CoWoS-L (Enhanced)</option></select></label>
            <label>Interconnect: <select id="interconnect"><option value="bump">μ범프</option><option value="SoIC">TSMC SoIC</option></select></label>
            <div id="tech-info-box">
                <strong>System Insights</strong>
                <div id="insights-log"></div>
            </div>
        </aside>
        <main id="diagram-container">
            <canvas id="cpoCanvas" width="1000" height="600"></canvas>
            <div id="status-banner"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
