<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPO 고정밀 반도체 구조 시뮬레이터</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>CPO 고정밀 반도체 구조 시뮬레이터</h1></header>
    <div id="app">
        <aside id="controls">
            <h2>시스템 파라미터</h2>
            <div class="control-group">
                <label>측면 오프셋 (ΔY/ΔZ): <input type="range" id="dy" min="0" max="5" step="0.1" value="1.6"></label>
                <label>종방향 간격 (ΔX): <input type="range" id="gap" min="0" max="50" step="1" value="36"></label>
                <label>레이저 입력 전력 (P_in): <input type="range" id="pin" min="6" max="26" step="0.1" value="20"></label>
                <label>도파관: <select id="material"><option value="Si">실리콘 (Si)</option><option value="SiN">질화규소 (SiN)</option></select></label>
                <label>인터커넥트: <select id="interconnect"><option value="bump">μ범프</option><option value="SoIC">TSMC SoIC</option></select></label>
                <label>기판: <select id="substrate"><option value="MCM">표준 MCM</option><option value="InFO">RDL InFO</option><option value="CoWoS">CoWoS-L</option></select></label>
            </div>
            <div id="tech-info-box">
                <h3>엔지니어링 인사이트</h3>
                <p id="insight-text">파라미터를 조정하여 물리적 특성을 탐색하세요.</p>
            </div>
        </aside>
        
        <main id="diagram-container">
            <svg id="diagram" viewBox="0 0 800 800">
                <!-- FAU Housing -->
                <g id="fau-housing">
                    <rect x="50" y="50" width="700" height="100" fill="#1e293b" stroke="#475569" stroke-width="2" rx="10"/>
                    <text x="60" y="80" fill="#f8fafc" font-weight="bold">FAU Housing</text>
                    <circle cx="100" cy="110" r="10" fill="#94a3b8"/>
                    <text x="120" y="115" fill="#f8fafc" font-size="12">Fibers</text>
                    <path d="M100 110 L300 110 L400 150" stroke="#fef08a" stroke-width="2" fill="none"/>
                    <text x="400" y="150" fill="#fef08a" font-size="12" font-weight="bold">TMR</text>
                </g>

                <!-- COIT -->
                <g id="coit-block">
                    <rect x="200" y="180" width="400" height="60" fill="#334155" stroke="#475569" rx="5"/>
                    <text x="210" y="210" fill="#f8fafc" font-weight="bold">COIT</text>
                    <line x1="210" y1="225" x2="590" y2="225" stroke="#38bdf8" stroke-width="2"/>
                    <text x="300" y="220" fill="#38bdf8" font-size="12">SiN WG (w/ PBSR)</text>
                </g>

                <!-- Micro-Lenses -->
                <ellipse id="lens-top" cx="400" cy="270" rx="30" ry="15" fill="#a1a1aa" opacity="0.8"/>
                <text x="440" y="275" fill="#f8fafc" font-size="12">Micro-Lens</text>
                <ellipse id="lens-bottom" cx="400" cy="350" rx="30" ry="15" fill="#a1a1aa" opacity="0.8"/>
                <line id="laser-beam" x1="400" y1="285" x2="400" y2="335" stroke="#fef08a" stroke-width="4"/>

                <!-- EIC & PIC -->
                <g id="eic-layer">
                    <rect x="200" y="400" width="400" height="60" fill="#f59e0b" rx="5"/>
                    <text x="210" y="435" fill="#020617" font-weight="bold">EIC</text>
                </g>
                <g id="pic-layer">
                    <rect x="200" y="460" width="400" height="80" fill="#0f172a" stroke="#475569" rx="5"/>
                    <text x="210" y="490" fill="#f8fafc" font-weight="bold">PIC</text>
                    <line x1="210" y1="500" x2="590" y2="500" stroke="#f59e0b" stroke-width="2"/>
                    <text x="210" y="515" fill="#f59e0b" font-size="12">SOI</text>
                    <line x1="210" y1="525" x2="590" y2="525" stroke="#38bdf8" stroke-width="2"/>
                    <text x="210" y="540" fill="#38bdf8" font-size="12">SiN WG</text>
                    <rect x="550" y="510" width="30" height="20" fill="#ef4444"/>
                    <text x="560" y="525" fill="#fff" font-size="10">BMR</text>
                    <text x="500" y="530" fill="#fff" font-size="10">COIB</text>
                </g>

                <!-- Interconnect -->
                <g id="interconnect-interface">
                    <text x="210" y="570" fill="#f8fafc" font-weight="bold">Interconnect Interface (μbump / SoIC Bond)</text>
                    <g id="bond-nodes"></g>
                </g>

                <!-- Substrate -->
                <g id="substrate-layer">
                    <rect x="50" y="600" width="700" height="150" fill="#334155" rx="5"/>
                    <text x="60" y="630" fill="#f8fafc" font-weight="bold">Substrate / Advanced Interposer</text>
                </g>
            </svg>
            <div id="alert-pulse" class="hidden">정렬 경고: 임계값 초과</div>
        </main>
        
        <div id="insights-log" class="panel">
            <h3>엔지니어링 인사이트 로그</h3>
            <ul id="log-entries">
                <li>시스템 초기화 완료.</li>
            </ul>
        </div>
    </div>
    
    <script src="simulation_engine.js"></script>
</body>
</html>
